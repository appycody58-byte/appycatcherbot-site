version: '3.8'

services:
  xbank-demo:
    build: .
    container_name: xbank-demo
    ports:
      - "8000:8000"
    environment:
      - XBANK_DB_PATH=/app/data/xbank.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s